<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <title>Prontuário Eletrônico — Psicologia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page-wrapper">

        <!-- PAINEL ESQUERDO: visível só no desktop -->
        <div class="panel-left">
            <div class="panel-logo">
                <img src="https://fcmsantacasasp.edu.br/vemprasanta/wp-content/themes/fcm-new/assets/imgs/logo.png"
                     alt="Santa Casa de São Paulo"
                     class="panel-logo-img"
                     onerror="this.style.display='none'">
            </div>

            <div class="panel-body">
                <div class="panel-badge">Psicologia Clínica</div>
                <h1 class="panel-headline">Cuidar começa<br><em>com escuta.</em></h1>
                <p class="panel-desc">
                    Sistema de prontuário eletrônico da Faculdade de Ciências Médicas da Santa Casa de São Paulo.
                </p>
            </div>

            <div class="panel-footer">
                <span>Santa Casa SP &copy; 2025</span>
                <span>Versão 2.1</span>
            </div>
        </div>

        <!-- PAINEL DIREITO: formulário -->
        <div class="panel-right">

            <!-- Logo: só aparece no mobile -->
            <div class="mobile-logo">
                <img src="https://fcmsantacasasp.edu.br/vemprasanta/wp-content/themes/fcm-new/assets/imgs/logo.png"
                     alt="Santa Casa"
                     onerror="this.style.display='none'">
            </div>

            <div class="form-card">
                <div class="form-eyebrow">Acesso restrito</div>
                <h2 class="form-title">Bem-vindo!</h2>
                <p class="form-subtitle">Insira suas credenciais institucionais para continuar.</p>

                <form id="loginForm" autocomplete="off" novalidate>

                    <div class="input-group">
                        <label for="username">Usuário </label>
                        <div class="input-wrap">
                            <i class="bi bi-person input-icon"></i>
                            <input type="text" id="username" name="username"
                                   placeholder="Digite seu LOGIN" required>
                        </div>
                    </div>

                    <div class="input-group password-group">
                        <label for="password">Senha</label>
                        <div class="password-wrapper input-wrap">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password" id="password" name="password"
                                   placeholder="Digite sua senha" required>
                            <span class="toggle-password" title="Mostrar senha">
                                <i class="bi bi-eye" id="toggleIcon"></i>
                            </span>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember">
                            <span>Lembrar acesso</span>
                        </label>
                        <a href="#" class="link-forgot">Esqueci a senha</a>
                    </div>

                    <button type="submit" class="btn-login">
                        <span>Entrar</span>
                        <i class="bi bi-arrow-right"></i>
                    </button>

                    <div id="message" class="message"></div>

                </form>
            </div>

           
            </p>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
